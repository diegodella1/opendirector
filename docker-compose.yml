services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: opendirector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-opendirector}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opendirector"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:${DB_PASSWORD:-opendirector}@db:5432/opendirector
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-for-opendirector-at-least-32-chars}
      PGRST_DB_POOL: 10

  opendirector:
    build:
      context: .
      args:
        BASE_PATH: ${BASE_PATH:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Database connection (for migrations via psql)
      PGHOST: db
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: ${DB_PASSWORD:-opendirector}
      PGDATABASE: opendirector
      # PostgREST URL (direct, bypasses /rest/v1 prefix)
      SUPABASE_URL: http://postgrest:3000
      POSTGREST_URL: http://postgrest:3000
      BASE_PATH: ${BASE_PATH:-}
      # JWT secret (shared with PostgREST)
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-for-opendirector-at-least-32-chars}
      # SERVICE_ROLE_KEY auto-generated by entrypoint if not set
    volumes:
      - media_data:/app/data

volumes:
  pgdata:
  media_data:
